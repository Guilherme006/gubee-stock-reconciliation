services:
  app:
    build:
      context: .
    container_name: gubee-stock-app
    environment:
      GUBEE_MYSQL_HOST: mysql
      GUBEE_MYSQL_PORT: 3306
      GUBEE_MYSQL_DATABASE: gubee_stock
      GUBEE_MYSQL_USER: gubee
      GUBEE_MYSQL_PASSWORD: gubee
      GUBEE_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      GUBEE_SECURITY_USER: ${GUBEE_SECURITY_USER:-admin}
      GUBEE_SECURITY_PASSWORD: ${GUBEE_SECURITY_PASSWORD:-gubee-admin}
      SPRING_PROFILES_ACTIVE: local
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: gubee-stock-mysql
    environment:
      MYSQL_DATABASE: gubee_stock
      MYSQL_USER: gubee
      MYSQL_PASSWORD: gubee
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.9.0
    container_name: gubee-stock-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1" ]
      interval: 10s
      timeout: 10s
      retries: 10

volumes:
  mysql_data:
