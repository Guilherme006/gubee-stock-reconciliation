spring:
  application:
    name: gubee-stock-reconciliation
  security:
    user:
      name: ${GUBEE_SECURITY_USER:admin}
      password: ${GUBEE_SECURITY_PASSWORD:gubee-admin}
  datasource:
    url: jdbc:mysql://${GUBEE_MYSQL_HOST:localhost}:${GUBEE_MYSQL_PORT:3307}/${GUBEE_MYSQL_DATABASE:gubee_stock}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${GUBEE_MYSQL_USER:gubee}
    password: ${GUBEE_MYSQL_PASSWORD:gubee}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: gubee-stock-reconciliation
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    listener:
      ack-mode: manual_immediate
  mvc:
    problemdetails:
      enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.gubee.stockreconciliation: INFO
    org.springframework: INFO
    org.apache.kafka: INFO
    org.hibernate: INFO

stock-reconciliation:
  kafka:
    stock-events-topic: stock-events
    dead-letter-topic: stock-events-dlt
    retry-max-attempts: 3
    retry-backoff-millis: 1000
