name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unit-tests:
    name: Unit and slice tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Maven tests
        run: mvn test

  integration-tests:
    name: Testcontainers integration tests
    runs-on: ubuntu-latest
    needs: unit-tests
    strategy:
      fail-fast: false
      matrix:
        test:
          - StockReconciliationPersistenceIT
          - StockEventKafkaListenerIT
          - StockEventKafkaDeadLetterIT
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run integration test
        run: mvn -Dtest=${{ matrix.test }} test
